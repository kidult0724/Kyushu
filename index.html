<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>九州觀景誌｜Kyushu Sight Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{--paper:#F1ECDD;--ink:#26221B;--clay:#B5482F;--line:#D8CFB5;--steam-deep:#39505F;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;}
.wrap{max-width:1000px;margin:0 auto;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
.card-img-wrapper{width:100%;height:170px;background:#E8E1CC;}
.card-img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>
// 1. 各縣市代表圖片（當指定圖片失效時會自動替換）
const REGIONAL_COVER = {
  "福岡": "https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=640&q=80",
  "佐賀": "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=640&q=80",
  "長崎": "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&w=640&q=80",
  "熊本": "https://images.unsplash.com/photo-1545569341-9eb8b30979d9?auto=format&fit=crop&w=640&q=80",
  "大分": "https://images.unsplash.com/photo-1516257984-b1b4d707412e?auto=format&fit=crop&w=640&q=80",
  "宮崎": "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=640&q=80",
  "鹿兒島": "https://images.unsplash.com/photo-1482862549707-f63cb32c5fd9?auto=format&fit=crop&w=640&q=80"
};

// 2. 你的景點資料庫（保持原本的結構）
const CURATED = [
  {id:"c1",name:"太宰府天滿宮",pref:"福岡",cat:"歷史文化",img:"https://invalid-url-test.com/photo.jpg",desc:"菅原道真總本社，擁有壯麗的桃山時代風格。"},
  {id:"c2",name:"柳川遊船",pref:"福岡",cat:"城市漫遊",img:"https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=640&q=80",desc:"傳統搖櫓船體驗。"}
];

function render(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  CURATED.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    
    // 圖片載入邏輯
    const wrapper = document.createElement('div');
    wrapper.className = 'card-img-wrapper';
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = s.img;
    
    // 關鍵錯誤處理：如果圖片讀取失敗，強制換成地區代表圖
    img.onerror = function() {
        console.log(`圖片載入失敗，更換 ${s.pref} 代表圖`);
        this.src = REGIONAL_COVER[s.pref] || REGIONAL_COVER["福岡"];
    };
    
    wrapper.appendChild(img);
    card.appendChild(wrapper);
    card.innerHTML += `<div class="card-body"><h3>${s.name}</h3><p>${s.desc}</p></div>`;
    grid.appendChild(card);
  });
}

render();
</script>
</body>
</html>
