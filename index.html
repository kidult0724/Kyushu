<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>九州觀景誌｜Kyushu Sight Log</title>
<style>
  /* --- 您的原始 CSS --- */
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  :root{ --paper:#F1ECDD; --ink:#26221B; --ink-soft:#5B5548; --clay:#B5482F; --clay-deep:#7C2F1D; --line:#D8CFB5; }
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;}
  .wrap{max-width:1000px;margin:0 auto;padding:20px;}
  .form{display:none;background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:24px;}
  .form.open{display:block;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .card-img-wrapper{width:100%;height:160px;background:#E8E1CC;overflow:hidden;}
  .card-img{width:100%;height:100%;object-fit:cover;}
  .card-body{padding:16px;}
</style>
</head>
<body>

<div class="wrap">
  <h1>九州觀景誌</h1>
  
  <div class="toolbar">
    <input id="searchInput" type="text" placeholder="搜尋景點名稱...">
    <button id="toggleForm">+ 新增景點</button>
  </div>

  <div class="form" id="addForm">
    <h3>新增一個景點</h3>
    <input id="f-name" type="text" placeholder="景點名稱"><br>
    <select id="f-pref"></select>
    <select id="f-cat"></select><br>
    <input id="f-img" type="text" placeholder="圖片網址 (選填，直接貼上網址即可)"><br>
    <textarea id="f-desc" placeholder="景點簡介"></textarea><br>
    <button id="submitSpot">加入景點清單</button>
    <button id="cancelSpot">取消</button>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
  // 1. 資料庫
  const PREFS = ["福岡","佐賀","長崎","熊本","大分","宮崎","鹿兒島"];
  const CATS = ["自然景觀","溫泉","歷史文化","親子樂園","城市漫遊","花卉庭園"];
  const FALLBACK_PICS = [
    "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=600&q=80",
    "https://images.unsplash.com/photo-1542640244-7e672d6cef21?auto=format&fit=crop&w=600&q=80"
  ];
  
  // 假設您原本的 CURATED 資料也在這裡，若沒有請保留空陣列
  const CURATED = []; 
  let userSpots = JSON.parse(localStorage.getItem('kyushu-user-spots') || '[]');

  // 2. 渲染函式
  function render(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    const allSpots = [...CURATED, ...userSpots];
    const filtered = allSpots.filter(s => s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q));

    filtered.forEach(s => {
      const card = document.createElement('div');
      card.className = 'card';
      // 邏輯：優先使用使用者輸入的 s.img，沒有則隨機選 fallback
      const imgSrc = s.img || FALLBACK_PICS[Math.floor(Math.random() * FALLBACK_PICS.length)];
      
      card.innerHTML = `
        <div class="card-img-wrapper"><img src="${imgSrc}" class="card-img"></div>
        <div class="card-body">
          <h3>${s.name}</h3>
          <p>${s.desc}</p>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  // 3. 事件連結
  document.getElementById('toggleForm').onclick = () => document.getElementById('addForm').classList.toggle('open');
  document.getElementById('cancelSpot').onclick = () => document.getElementById('addForm').classList.remove('open');
  document.getElementById('searchInput').oninput = render;

  document.getElementById('submitSpot').onclick = () => {
    const spot = {
      name: document.getElementById('f-name').value,
      pref: document.getElementById('f-pref').value,
      cat: document.getElementById('f-cat').value,
      img: document.getElementById('f-img').value, // 儲存自訂圖片
      desc: document.getElementById('f-desc').value
    };
    userSpots.push(spot);
    localStorage.setItem('kyushu-user-spots', JSON.stringify(userSpots));
    document.getElementById('addForm').classList.remove('open');
    render();
  };

  // 初始化選單
  PREFS.forEach(p => { const o = document.createElement('option'); o.text = p; document.getElementById('f-pref').add(o); });
  CATS.forEach(c => { const o = document.createElement('option'); o.text = c; document.getElementById('f-cat').add(o); });
  
  render();
</script>
</body>
</html>
