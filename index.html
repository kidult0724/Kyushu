<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>九州觀景誌｜Kyushu Sight Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght=500;700&family=Noto+Sans+TC:wght=400;500;700&display=swap');

:root{
  --paper:#F1ECDD;
  --paper-2:#E8E1CC;
  --ink:#26221B;
  --ink-soft:#5B5548;
  --clay:#B5482F;
  --clay-deep:#7C2F1D;
  --pine:#3F6B54;
  --pine-deep:#254537;
  --steam:#5E7C93;
  --steam-deep:#39505F;
  --gold:#C79A44;
  --gold-deep:#8A6620;
  --line:#D8CFB5;
}

*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px 60px;}

.hero{position:relative;padding:56px 20px 40px;overflow:hidden;border-bottom:1px solid var(--line);}
.hero svg{position:absolute;top:-40px;right:-60px;width:420px;height:420px;opacity:0.55;pointer-events:none;}
.eyebrow{font-size:13px;letter-spacing:.12em;color:var(--clay-deep);font-weight:700;margin:0 0 10px;}
.hero h1{font-family:'Shippori Mincho',serif;font-weight:700;font-size:40px;margin:0 0 12px;line-height:1.25;color:var(--ink);position:relative;}
.hero p{max-width:560px;font-size:15px;line-height:1.8;color:var(--ink-soft);margin:0;position:relative;}

.weather-panel{margin-top:30px;position:relative;}
.weather-title{font-size:12px;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.weather-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;}
.wcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
.wcard .wp{font-size:12px;font-weight:700;color:var(--steam-deep);}
.wcard .wt{font-family:'Shippori Mincho',serif;font-size:22px;margin:4px 0 2px;}
.wcard .wd{font-size:11.5px;color:var(--ink-soft);}
.wcard.loading{color:var(--ink-soft);font-size:12px;}

.toolbar{margin-top:30px;display:flex;flex-direction:column;gap:14px;}
.search{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px 14px;}
.search input{flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);}
.search input::placeholder{color:#a39c86;}

.chiprow{display:flex;flex-wrap:wrap;gap:8px;}
.chiprow-label{font-size:12px;color:var(--ink-soft);width:100%;letter-spacing:.05em;margin-bottom:-2px;}
.chip{border:1px solid var(--line);background:#fff;color:var(--ink-soft);border-radius:999px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .15s,color .15s,border-color .15s;}
.chip:hover{border-color:var(--clay);}
.chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

.count-row{display:flex;justify-content:space-between;align-items:center;margin:28px 0 14px;}
.count-row span{font-size:13px;color:var(--ink-soft);}
.addbtn{border:1px solid var(--clay);color:var(--clay-deep);background:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.addbtn:hover{background:var(--clay);color:#fff;}

.form{display:none;background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:24px;}
.form.open{display:block;}
.form h3{font-family:'Shippori Mincho',serif;font-size:18px;margin:0 0 14px;color:var(--clay-deep);}
.form .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:4px;}
.form input,.form select,.form textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font-size:14px;font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);}
.form textarea{resize:vertical;min-height:60px;}
.form-actions{display:flex;gap:10px;margin-top:8px;}
.form-actions button{border-radius:6px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;border:1px solid var(--line);}
.btn-primary{background:var(--clay);color:#fff;border-color:var(--clay);}
.btn-ghost{background:transparent;color:var(--ink-soft);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:6px;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative;display:flex;flex-direction:column;transition:transform 0.2s, box-shadow 0.2s;}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(38,34,27,0.08);}

/* 景點真實相片區 */
.card-img-wrapper{position:relative;width:100%;height:170px;background:#E8E1CC;overflow:hidden;border-bottom:1px solid var(--line);}
.card-img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease;}
.card:hover .card-img{transform:scale(1.05);}

.card-body{padding:16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-pref{font-size:11px;letter-spacing:.06em;color:var(--steam-deep);font-weight:700;}
.card h3{font-family:'Shippori Mincho',serif;font-size:19px;margin:2px 0 0;color:var(--ink);line-height:1.35;}
.fav{border:none;background:none;cursor:pointer;font-size:18px;color:var(--line);line-height:1;padding:2px;}
.fav.on{color:var(--gold-deep);}
.card p{font-size:13px;line-height:1.75;color:var(--ink-soft);margin:0;flex:1;}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.tag{font-size:11px;padding:3px 9px;border-radius:999px;font-weight:700;}
.tag.cat{background:#EFE7D6;color:var(--clay-deep);}
.tag.season{background:#E4EAE1;color:var(--pine-deep);}
.tag.user{background:#E6EDF1;color:var(--steam-deep);}
.tag.ticket{background:#FCF4E2;color:var(--gold-deep);border:1px solid rgba(199,154,68,0.35);}

.card-actions{display:flex;gap:8px;margin-top:8px;}
.maplink{flex:1;text-align:center;border:1px solid var(--line);border-radius:6px;padding:7px 8px;font-size:12px;color:var(--steam-deep);text-decoration:none;font-weight:700;}
.maplink:hover{border-color:var(--steam);background:#F4F7F8;}
.maplink.route{color:var(--clay-deep);}
.maplink.route:hover{border-color:var(--clay);background:#FBF0EC;}
.empty{padding:40px 0;text-align:center;color:var(--ink-soft);font-size:14px;}

footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);line-height:1.7;}
</style>
</head>
<body>
<div class="hero">
  <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="200" cy="200" r="170" fill="none" stroke="#B5482F" stroke-width="1"/>
    <circle cx="200" cy="200" r="135" fill="none" stroke="#3F6B54" stroke-width="1"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="#C79A44" stroke-width="1"/>
    <circle cx="200" cy="200" r="65" fill="none" stroke="#5E7C93" stroke-width="1"/>
    <circle cx="200" cy="200" r="30" fill="none" stroke="#26221B" stroke-width="1.4"/>
  </svg>
  <div class="wrap" style="padding:0;">
    <p class="eyebrow">九州七縣 · 景點蒐集誌</p>
    <h1>九州觀景誌</h1>
    <p>整理福岡、佐賀、長崎、熊本、大分、宮崎、鹿兒島七縣的精選景點，即時查看各縣天氣，並可一鍵開啟 Google 地圖路線，隨時新增你發現的最新景點。</p>
    <div class="weather-panel">
      <div class="weather-title">七縣即時天氣（資料來源：Open-Meteo）</div>
      <div class="weather-row" id="weatherRow"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="toolbar">
    <div class="search">
      <span aria-hidden="true">🔎</span>
      <input id="searchInput" type="text" placeholder="搜尋景點名稱或關鍵字，例如：溫泉、免費、門票、金鱗湖">
    </div>
    <div class="chiprow" id="prefRow"><span class="chiprow-label">縣市</span></div>
    <div class="chiprow" id="catRow"><span class="chiprow-label">類型</span></div>
  </div>

  <div class="count-row">
    <span id="countLabel">共 0 個景點</span>
    <button class="addbtn" id="toggleForm">+ 新增景點</button>
  </div>

  <div class="form" id="addForm">
    <h3>新增一個景點</h3>
    <div class="row">
      <div>
        <label for="f-name">景點名稱</label>
        <input id="f-name" type="text" placeholder="例如：由布院花卉村">
      </div>
      <div>
        <label for="f-pref">縣市</label>
        <select id="f-pref"></select>
      </div>
    </div>
    <div class="row">
      <div>
        <label for="f-cat">類型</label>
        <select id="f-cat"></select>
      </div>
      <div>
        <label for="f-season">最佳季節（選填）</label>
        <input id="f-season" type="text" placeholder="例如：11月賞楓">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="f-ticket">門票費用資訊</label>
        <input id="f-ticket" type="text" placeholder="例如：免費參觀、或約 500 日圓">
      </div>
      <div style="visibility: hidden;">
      </div>
    </div>
    <div>
      <label for="f-desc">簡介</label>
      <textarea id="f-desc" placeholder="這個景點的特色是什麼？"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="submitSpot">加入景點清單</button>
      <button class="btn-ghost" id="cancelSpot">取消</button>
    </div>
    <p class="hint">新增的景點會標示「使用者新增」，並保存在這台裝置的瀏覽器裡。</p>
  </div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none;">找不到符合條件的景點，試試其他關鍵字或篩選條件。</div>

  <footer>
    景點資料與真實景點照片整理自維基百科公有領域授權與公開旅遊資訊，僅供行前參考，實際開放時間與票價請以官方公告為準。
  </footer>
</div>

  {id:"c3",name:"博多運河城",pref:"福岡",cat:"城市漫遊",season:"全年",ticket:"免費參觀",img:"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Canal_City_Hakata_201711.jpg/640px-Canal_City_Hakata_201711.jpg",desc:"福岡最知名的複合式休閒商場，一條人工運河貫穿其中，定時有震撼的多媒體噴泉光影秀。"},

const FALLBACK_PICS = [
  "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Dazaifu_Tenmangu_honden.jpg/640px-Dazaifu_Tenmangu_honden.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Kokura_Castle_2019.jpg/640px-Kokura_Castle_2019.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Sea_Hell_Beppu_Japan.jpg/640px-Sea_Hell_Beppu_Japan.jpg",
  "https://upload.wikimedia.org/wikipedia/commons/thumb/b/be/Kamisikimi_Kumano_za_Shrine.jpg/640px-Kamisikimi_Kumano_za_Shrine.jpg"
];

let userSpots = [];
let favorites = {};
let activePref = null;
let activeCat = null;

function el(tag, cls, text){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(text !== undefined) e.textContent = text;
  return e;
}

function buildChipRow(container, values, onPick){
  values.forEach(v => {
    const chip = el('button','chip',v);
    chip.type = 'button';
    chip.addEventListener('click', () => onPick(v));
    container.appendChild(chip);
  });
}

const prefRow = document.getElementById('prefRow');
const catRow = document.getElementById('catRow');
buildChipRow(prefRow, PREFS, (v) => {
  activePref = (activePref === v) ? null : v;
  render();
});
buildChipRow(catRow, CATS, (v) => {
  activeCat = (activeCat === v) ? null : v;
  render();
});

function syncChips(){
  [...prefRow.querySelectorAll('.chip')].forEach(c => c.classList.toggle('active', c.textContent === activePref));
  [...catRow.querySelectorAll('.chip')].forEach(c => c.classList.toggle('active', c.textContent === activeCat));
}

const fPref = document.getElementById('f-pref');
const fCat = document.getElementById('f-cat');
PREFS.forEach(p => { const o = el('option', null, p); o.value = p; fPref.appendChild(o); });
CATS.forEach(c => { const o = el('option', null, c); o.value = c; fCat.appendChild(o); });

function allSpots(){
  return [...CURATED, ...userSpots];
}

function mapSearchUrl(spot){
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(spot.name + ' ' + spot.pref + ' 日本');
}
function mapDirectionsUrl(spot){
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(spot.name + ' ' + spot.pref + ' 日本') + '&travelmode=driving';
}

function render(){
  syncChips();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const spots = allSpots().filter(s => {
    if(activePref && s.pref !== activePref) return false;
    if(activeCat && s.cat !== activeCat) return false;
    if(q && !(s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || (s.season||'').toLowerCase().includes(q) || (s.ticket||'').toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById('countLabel').textContent = `共 ${spots.length} 個景點`;
  document.getElementById('emptyState').style.display = spots.length ? 'none' : 'block';

  spots.forEach(s => {
    const card = el('div','card');
    
    const imgWrapper = el('div', 'card-img-wrapper');
    const img = el('img', 'card-img');
    img.src = s.img || FALLBACK_PICS[Math.floor(Math.random() * FALLBACK_PICS.length)];
    img.alt = s.name;
    img.loading = "lazy";
    imgWrapper.appendChild(img);
    card.appendChild(imgWrapper);

    const body = el('div', 'card-body');

    const top = el('div','card-top');
    const left = el('div');
    left.appendChild(el('div','card-pref',s.pref));
    left.appendChild(el('h3',null,s.name));
    top.appendChild(left);
    const fav = el('button','fav' + (favorites[s.id] ? ' on' : ''), favorites[s.id] ? '♥' : '♡');
    fav.type = 'button';
    fav.setAttribute('aria-label','收藏此景點');
    fav.addEventListener('click', () => toggleFavorite(s.id, fav));
    top.appendChild(fav);
    body.appendChild(top);

    body.appendChild(el('p',null,s.desc));
    
    const tags = el('div','card-tags');
    tags.appendChild(el('span','tag cat',s.cat));
    
    const ticketText = s.ticket || "免費參觀";
    tags.appendChild(el('span','tag ticket','🎟️ ' + ticketText));

    if(s.season) tags.appendChild(el('span','tag season',s.season));
    if(s.userAdded) tags.appendChild(el('span','tag user','使用者新增'));
    body.appendChild(tags);

    const actions = el('div','card-actions');
    const viewLink = document.createElement('a');
    viewLink.className = 'maplink';
    viewLink.href = mapSearchUrl(s);
    viewLink.target = '_blank';
    viewLink.rel = 'noopener';
    viewLink.textContent = '📍 查看地圖';
    const routeLink = document.createElement('a');
    routeLink.className = 'maplink route';
    routeLink.href = mapDirectionsUrl(s);
    routeLink.target = '_blank';
    routeLink.rel = 'noopener';
    routeLink.textContent = '🚗 規劃路線';
    actions.appendChild(viewLink);
    actions.appendChild(routeLink);
    body.appendChild(actions);

    card.appendChild(body);
    grid.appendChild(card);
  });
}

function toggleFavorite(id, btn){
  favorites[id] = !favorites[id];
  btn.classList.toggle('on', favorites[id]);
  btn.textContent = favorites[id] ? '♥' : '♡';
  try{
    localStorage.setItem('kyushu-favorites', JSON.stringify(favorites));
  }catch(e){}
}

function loadFavorites(){
  try{
    const v = localStorage.getItem('kyushu-favorites');
    if(v) favorites = JSON.parse(v);
  }catch(e){ favorites = {}; }
}

function loadUserSpots(){
  try{
    const v = localStorage.getItem('kyushu-user-spots');
    if(v) userSpots = JSON.parse(v);
  }catch(e){ userSpots = []; }
}

function saveUserSpots(){
  try{
    localStorage.setItem('kyushu-user-spots', JSON.stringify(userSpots));
  }catch(e){}
}

document.getElementById('searchInput').addEventListener('input', render);

const formEl = document.getElementById('addForm');
document.getElementById('toggleForm').addEventListener('click', () => {
  formEl.classList.toggle('open');
});
document.getElementById('cancelSpot').addEventListener('click', () => {
  formEl.classList.remove('open');
});

document.getElementById('submitSpot').addEventListener('click', () => {
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const ticketInput = document.getElementById('f-ticket').value.trim();
  if(!name || !desc){
    alert('請至少填寫景點名稱與簡介');
    return;
  }
  const spot = {
    id: 'u' + Date.now(),
    name,
    pref: fPref.value,
    cat: fCat.value,
    season: document.getElementById('f-season').value.trim(),
    ticket: ticketInput || '免費參觀',
    desc,
    userAdded: true
  };
  userSpots.push(spot);
  saveUserSpots();
  document.getElementById('f-name').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-season').value = '';
  document.getElementById('f-ticket').value = '';
  formEl.classList.remove('open');
  render();
});

async function loadWeather(){
  const row = document.getElementById('weatherRow');
  row.innerHTML = '';
  PREFS.forEach(p => {
    const c = el('div','wcard loading','讀取中…');
    c.id = 'w-' + p;
    row.appendChild(c);
  });
  await Promise.all(PREFS.map(async (p) => {
    const [lat, lon] = PREF_COORDS[p];
    const card = document.getElementById('w-' + p);
    try{
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
      const res = await fetch(url);
      if(!res.ok) throw new Error('weather fetch failed');
      const data = await res.json();
      const cw = data.current_weather;
      const desc = WEATHER_CODE_MAP[cw.weathercode] || '天氣資料';
      const tmax = data.daily && data.daily.temperature_2m_max ? Math.round(data.daily.temperature_2m_max[0]) : null;
      const tmin = data.daily && data.daily.temperature_2m_min ? Math.round(data.daily.temperature_2m_min[0]) : null;
      card.className = 'wcard';
      card.innerHTML = '';
      card.appendChild(el('div','wp',p));
      card.appendChild(el('div','wt', Math.round(cw.temperature) + '°C'));
      const range = (tmax !== null && tmin !== null) ? `${desc}・${tmin}° / ${tmax}°` : desc;
      card.appendChild(el('div','wd',range));
    }catch(e){
      card.className = 'wcard';
      card.innerHTML = '';
      card.appendChild(el('div','wp',p));
      card.appendChild(el('div','wd','天氣資料暫時無法取得'));
    }
  }));
}

(async function init(){
  loadFavorites();
  loadUserSpots();
  await loadWeather();
  render();
})();
</script>
