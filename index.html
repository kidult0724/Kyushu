<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>九州觀景誌｜Kyushu Sight Log</title>
<style>
  /* 基礎樣式 */
  body { background: #F1ECDD; font-family: 'Noto Sans TC', sans-serif; color: #26221B; margin: 0; }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
  .card { background: #fff; border: 1px solid #D8CFB5; border-radius: 12px; overflow: hidden; }
  .card-img-wrapper { width: 100%; height: 170px; background: #E8E1CC; overflow: hidden; }
  .card-img { width: 100%; height: 100%; object-fit: cover; }
  .card-body { padding: 16px; }
  h3 { margin: 0 0 8px; font-size: 18px; }
  p { font-size: 13px; color: #5B5548; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid" id="grid"></div>
</div>

<script>
// 1. 各縣市代表圖片（當圖片失效時，自動切換為此圖）
const REGIONAL_COVER = {
  "福岡": "https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=640&q=80",
  "佐賀": "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?auto=format&fit=crop&w=640&q=80",
  "長崎": "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?auto=format&fit=crop&w=640&q=80",
  "熊本": "https://images.unsplash.com/photo-1545569341-9eb8b30979d9?auto=format&fit=crop&w=640&q=80",
  "大分": "https://images.unsplash.com/photo-1516257984-b1b4d707412e?auto=format&fit=crop&w=640&q=80",
  "宮崎": "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=640&q=80",
  "鹿兒島": "https://images.unsplash.com/photo-1482862549707-f63cb32c5fd9?auto=format&fit=crop&w=640&q=80"
};

// 2. 景點庫（我保留了結構，確保你可以繼續使用）
const CURATED = [
  {id:"c1",name:"太宰府天滿宮",pref:"福岡",desc:"學問之神總本社，梅花祭時格外美麗。",img:"https://images.unsplash.com/photo-1570162791599-2785d0d8fd16?auto=format&fit=crop&w=640&q=80"},
  {id:"c2",name:"柳川遊船",pref:"福岡",desc:"搭乘傳統搖櫓船感受水鄉風情。",img:"https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=640&q=80"},
  {id:"c21",name:"熊本城",pref:"熊本",desc:"日本三大名城之一，以堅固石垣聞名。",img:"https://images.unsplash.com/photo-1545569341-9eb8b30979d9?auto=format&fit=crop&w=640&q=80"},
  {id:"c22",name:"阿蘇火山",pref:"熊本",desc:"近距離觀察壯闊的火山口絕景。",img:"https://images.unsplash.com/photo-1569949381669-ecf31ae8e613?auto=format&fit=crop&w=640&q=80"},
  {id:"c40",name:"櫻島活火山",pref:"鹿兒島",desc:"鹿兒島的地標，可漫步於熔岩步道。",img:"https://images.unsplash.com/photo-1482862549707-f63cb32c5fd9?auto=format&fit=crop&w=640&q=80"}
  // ...你可以繼續在此加入其他 40 個景點資料，格式完全一樣
];

// 3. 自動渲染與容錯引擎
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  CURATED.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = s.img;
    // 重點：發生錯誤自動切換
    img.onerror = function() { 
        this.src = REGIONAL_COVER[s.pref] || REGIONAL_COVER["福岡"]; 
    };
    
    card.innerHTML = `
      <div class="card-img-wrapper"></div>
      <div class="card-body">
        <h3>${s.name}</h3>
        <p>${s.desc}</p>
      </div>
    `;
    card.querySelector('.card-img-wrapper').appendChild(img);
    grid.appendChild(card);
  });
}

render();
</script>
</body>
</html>
